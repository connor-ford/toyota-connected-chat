name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          REACT_APP_LEX_API_URL:     ${{ secrets.REACT_APP_LEX_API_URL }}
          REACT_APP_CONNECT_API_URL: ${{ secrets.REACT_APP_CONNECT_API_URL }}
          REACT_APP_API_KEY:         ${{ secrets.REACT_APP_API_KEY }}
          REACT_APP_AWS_REGION:      ${{ secrets.REACT_APP_AWS_REGION }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
